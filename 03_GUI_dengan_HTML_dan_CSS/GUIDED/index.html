<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- supaya semua karakter bisa terbaca dengan benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- supaya tampilan menyesuaikan layar device -->
    
    <title>KPL REVAL</title> <!-- judul halaman yang muncul di tab browser -->
    <link rel="stylesheet" href="./index.css"> <!-- menghubungkan file CSS -->
</head>

<body>

    <div class="container"> <!-- container untuk membungkus semua konten -->
        <h1>Pemeriksa Teks</h1>
        <p>Masukkan teks lalu klik tombol cek untuk melihat hasilnya.</p>

        <div class="input-group">
            <label for="editor-kecil">Masukkan teks:</label> <!-- label untuk textarea -->
            <textarea class="kotak-input" id="editor-kecil" rows="10" cols="60" placeholder="Kata-kata..."></textarea>
            <!-- textarea sebagai tempat user mengetik teks -->
        </div>

        <p>
            Huruf: <span id="hf">0</span>, 
            huruf besar: <span id="hb">0</span>, 
            huruf kecil: <span id="hk">0</span>
            <!-- span ini akan diisi hasil perhitungan dari JavaScript -->
        </p>

        <div class="button-group">
            <button id="cek-teks">Cek Teks</button>
            <!-- tombol untuk mengecek teks dan menampilkan popup -->
        </div>
    </div>

    <!-- popup yang akan muncul ketika menekan tombol cek teks -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <img src="https://tenor.com/view/umamusume-haru-urara-umazing-anime-gif-1193222197980579467.gif" alt="success">
            <!-- gif yang muncul ketika teks berhasil dicek -->
            <p>Teks berhasil dicek, bisa tutup dan lihat hasilnya</p>
            <button id="tutup">Tutup</button>
        </div>
    </div>

<script src="./index.js"></script> <!-- menghubungkan file JavaScript -->
</body>
</html>
